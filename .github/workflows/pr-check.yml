name: PR Quality Check

on:
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Run analyzer
        run: flutter analyze
        working-directory: frontend

      - name: Run tests
        run: flutter test
        working-directory: frontend