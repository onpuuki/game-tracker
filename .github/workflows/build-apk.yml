name: Build Flutter APK

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Admin APK
        working-directory: frontend
        run: |
          flutter build apk --release --flavor admin --dart-define=IS_ADMIN=true

      - name: Build User APK
        working-directory: frontend
        run: |
          flutter build apk --release --flavor user --dart-define=IS_ADMIN=false

      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          files: |
            frontend/build/app/outputs/flutter-apk/app-admin-release.apk
            frontend/build/app/outputs/flutter-apk/app-user-release.apk

      - name: Generate SourceCode.txt
        run: |
          OUTPUT_FILE="SourceCode.txt"
          echo "=== GIT LOG ===" > "$OUTPUT_FILE"
          git log -n 5 --oneline >> "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"

          FILES=$(find frontend/lib/ frontend/android/ frontend/ios/ functions/src/ .github/workflows/ -type f -not -path "*/build/*" -not -path "*/.gradle/*" -not -path "*/.dart_tool/*" -not -path "*/Pods/*" \( -name "*.dart" -o -name "*.ts" -o -name "*.yml" -o -name "*.kt" -o -name "*.xml" -o -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.swift" -o -name "*.pbxproj" \) | grep -E -v "\.g\.dart$|\.freezed\.dart$" || true)
          EXTRA_FILES="frontend/pubspec.yaml frontend/analysis_options.yaml functions/package.json firestore.rules firestore.indexes.json firebase.json"

          for FILE in $FILES $EXTRA_FILES; do
            if [ -f "$FILE" ]; then
              echo "=== FILE: $FILE ===" >> "$OUTPUT_FILE"
              cat "$FILE" >> "$OUTPUT_FILE"
              echo "" >> "$OUTPUT_FILE"
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install googleapis
        run: npm install googleapis

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Upload to Google Drive
        run: |
          cat << 'EOF' > upload.js
          const { google } = require('googleapis');
          const fs = require('fs');
          const auth = new google.auth.GoogleAuth({ scopes: ['https://www.googleapis.com/auth/drive'] });
          const drive = google.drive({ version: 'v3', auth });
          const FOLDER_ID = '1jHDT34dWhHOqNLrBa2_n-8vyCNJOlhYr';

          async function main() {
            try {
              console.log("Fetching files in Drive folder...");
              const res = await drive.files.list({
                q: `'${FOLDER_ID}' in parents and trashed=false`,
                supportsAllDrives: true,
                includeItemsFromAllDrives: true,
                fields: 'files(id, name)'
              });

              const driveFiles = res.data.files || [];
              console.log("Files seen by Service Account in Drive:", driveFiles.map(f => f.name));

              async function updateFile(localPath, keyword, mimeType) {
                if (!fs.existsSync(localPath)) {
                  console.log(`Skip: ${localPath} does not exist.`);
                  return;
                }

                const target = driveFiles.find(f => f.name.toLowerCase().includes(keyword.toLowerCase()));
                if (!target) {
                  throw new Error(`Could not find any file containing '${keyword}' in Drive folder.`);
                }

                console.log(`Updating Drive file '${target.name}' (${target.id}) with local ${localPath}...`);
                await drive.files.update({
                  fileId: target.id,
                  media: { mimeType: mimeType, body: fs.createReadStream(localPath) },
                  supportsAllDrives: true
                });
                console.log(`Successfully updated ${target.name}`);
              }

              await updateFile('SourceCode.txt', 'SourceCode', 'text/plain');
              await updateFile('frontend/build/app/outputs/flutter-apk/app-admin-release.apk', 'app-admin', 'application/vnd.android.package-archive');
              await updateFile('frontend/build/app/outputs/flutter-apk/app-user-release.apk', 'app-user', 'application/vnd.android.package-archive');

            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          main();
          EOF
          node upload.js
