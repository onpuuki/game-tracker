name: Build Flutter APK

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Admin APK
        working-directory: frontend
        run: |
          flutter build apk --release --flavor admin --dart-define=IS_ADMIN=true

      - name: Build User APK
        working-directory: frontend
        run: |
          flutter build apk --release --flavor user --dart-define=IS_ADMIN=false

      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          files: |
            frontend/build/app/outputs/flutter-apk/app-admin-release.apk
            frontend/build/app/outputs/flutter-apk/app-user-release.apk

      - name: Generate SourceCode.txt
        run: |
          OUTPUT_FILE="SourceCode.txt"
          echo "=== GIT LOG ===" > "$OUTPUT_FILE"
          git log -n 5 --oneline >> "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"

          FILES=$(find frontend/lib/ functions/src/ .github/workflows/ -type f \( -name "*.dart" -o -name "*.ts" -o -name "*.yml" \) | grep -E -v "\.g\.dart$|\.freezed\.dart$" || true)
          EXTRA_FILES="frontend/pubspec.yaml frontend/analysis_options.yaml functions/package.json firestore.rules firestore.indexes.json firebase.json"

          for FILE in $FILES $EXTRA_FILES; do
            if [ -f "$FILE" ]; then
              echo "=== FILE: $FILE ===" >> "$OUTPUT_FILE"
              cat "$FILE" >> "$OUTPUT_FILE"
              echo "" >> "$OUTPUT_FILE"
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install googleapis
        run: npm install googleapis

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Upload to Google Drive
        run: |
          cat << 'EOF' > upload.js
          const { google } = require('googleapis');
          const fs = require('fs');
          const auth = new google.auth.GoogleAuth({ scopes: ['https://www.googleapis.com/auth/drive'] });
          const drive = google.drive({ version: 'v3', auth });
          const FOLDER_ID = '1jHDT34dWhHOqNLrBa2_n-8vyCNJOlhYr';

          async function uploadFile(filePath, fileName, mimeType) {
            if (!fs.existsSync(filePath)) {
              console.log(`Skip: ${filePath} does not exist.`);
              return;
            }
            console.log(`Uploading ${fileName}...`);

            // 既存ファイルの検索（共有ドライブ対応のパラメータを完全指定）
            const res = await drive.files.list({
              q: `'${FOLDER_ID}' in parents and name='${fileName}' and trashed=false`,
              supportsAllDrives: true,
              includeItemsFromAllDrives: true
            });

            const files = res.data.files;
            if (!files || files.length === 0) {
              throw new Error(`Dummy file '${fileName}' not found in Drive. Please create it manually first!`);
            }

            const fileId = files[0].id;
            console.log(`Found existing dummy file (${fileId}), updating...`);

            // 上書き（Update）のみを実行
            await drive.files.update({
              fileId: fileId,
              media: { mimeType: mimeType, body: fs.createReadStream(filePath) },
              supportsAllDrives: true
            });
            console.log(`Successfully updated ${fileName}`);
          }

          async function main() {
            try {
              await uploadFile('SourceCode.txt', 'SourceCode.txt', 'text/plain');
              await uploadFile('frontend/build/app/outputs/flutter-apk/app-admin-release.apk', 'app-admin-release.apk', 'application/vnd.android.package-archive');
              await uploadFile('frontend/build/app/outputs/flutter-apk/app-user-release.apk', 'app-user-release.apk', 'application/vnd.android.package-archive');
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          }
          main();
          EOF
          node upload.js
